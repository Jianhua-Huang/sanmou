<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sanmou</title>
    <meta name="description" content="Sanmou static site published with GitHub Pages.">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5ef;
        --text: #1d2528;
        --muted: #5c676b;
        --accent: #0f766e;
        --line: #d8d2c4;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 36%),
          var(--bg);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 48px 20px;
      }

      .wrap {
        width: min(920px, 100%);
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 780px;
        font-size: clamp(44px, 9vw, 96px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 28px 0 0;
        max-width: 620px;
        color: var(--muted);
        font-size: 20px;
        line-height: 1.7;
      }

      .panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        margin-top: 56px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--line);
      }

      .item {
        min-height: 126px;
        padding: 22px;
        background: var(--panel);
      }

      .item strong {
        display: block;
        margin-bottom: 10px;
        font-size: 18px;
      }

      .item span {
        color: var(--muted);
        line-height: 1.6;
      }

      @media (max-width: 720px) {
        main {
          place-items: start center;
          padding-top: 72px;
        }

        .panel {
          grid-template-columns: 1fr;
        }

        p {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="wrap">
        <p class="eyebrow">GitHub Pages</p>
        <h1>Sanmou 静态网页</h1>
        <p>
          这是一个已经准备好发布到 GitHub Pages 的静态页面。后续可以继续替换为项目介绍、产品页面、文档入口或下载页。
        </p>
        <section class="panel" aria-label="页面信息">
          <div class="item">
            <strong>静态托管</strong>
            <span>无需服务器运行环境，直接由 GitHub Pages 分发。</span>
          </div>
          <div class="item">
            <strong>响应式布局</strong>
            <span>桌面和移动端都能保持清晰的阅读体验。</span>
          </div>
          <div class="item">
            <strong>可继续扩展</strong>
            <span>可以加入图片、导航、表单、文档或多页面结构。</span>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
