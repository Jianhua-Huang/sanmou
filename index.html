<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>三谋 S2 配队匹配</title>
    <meta name="description" content="基于 S2 队伍攻略的武将与战法匹配工具。">
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f1;
        --text: #15201f;
        --muted: #60706d;
        --accent: #087568;
        --accent-strong: #075e54;
        --accent-soft: #e4f5f2;
        --line: #d7dfdc;
        --panel: #ffffff;
        --panel-soft: #f8faf9;
        --soft: #eaf7f4;
        --warn: #9a3412;
        --warn-soft: #fff4ed;
        --shadow: 0 12px 34px rgba(17, 24, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, #f9fbfb 0, var(--bg) 360px),
          var(--bg);
      }

      main {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 24px 18px 48px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px 20px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .status {
        max-width: 380px;
        border: 1px solid #b9dcd6;
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--muted);
        background: var(--accent-soft);
        font-size: 14px;
        text-align: right;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 13px;
        color: var(--text);
        background: var(--panel);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease, transform 0.15s ease;
      }

      button:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .primary {
        border-color: var(--accent);
        color: #fff;
        background: var(--accent);
        font-weight: 700;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        align-items: start;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(340px, 420px) minmax(0, 1fr);
        gap: 14px;
        align-items: start;
      }

      .picker-column {
        display: grid;
        gap: 14px;
        align-self: start;
        position: sticky;
        top: 14px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 8px 22px rgba(17, 24, 39, 0.05);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
        border-radius: 8px 8px 0 0;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .actions button {
        min-height: 32px;
        padding: 5px 10px;
        font-size: 14px;
        background: #fff;
      }

      .search {
        width: calc(100% - 28px);
        margin: 12px 14px 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 11px;
        font: inherit;
        outline: none;
        background: #fff;
      }

      .search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(8, 117, 104, 0.12);
      }

      .check-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        gap: 8px;
        max-height: 290px;
        overflow: auto;
        padding: 14px;
      }

      label.option {
        display: flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 9px;
        background: #fff;
        font-size: 14px;
        line-height: 1.3;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }

      label.option:hover {
        border-color: #9fc9c2;
        box-shadow: 0 2px 8px rgba(17, 24, 39, 0.06);
      }

      label.option:has(input:checked) {
        border-color: var(--accent);
        background: var(--soft);
        color: var(--accent-strong);
        font-weight: 650;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--accent);
      }

      .results {
        min-height: 620px;
      }

      .results-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
        border-radius: 8px 8px 0 0;
      }

      .result-list {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .match {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fff;
        box-shadow: 0 4px 14px rgba(17, 24, 39, 0.04);
      }

      .match-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .match h3 {
        margin: 0;
        font-size: 17px;
      }

      .score {
        min-width: 150px;
        align-self: start;
        border: 1px solid #b9dcd6;
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--accent-strong);
        background: var(--accent-soft);
        font-weight: 700;
        text-align: right;
        font-size: 13px;
      }

      .meta,
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .rows {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .general-row {
        border: 1px solid #e5ebe8;
        border-radius: 6px;
        padding: 8px 9px;
        background: #fbfcfc;
        line-height: 1.5;
      }

      .general-name {
        margin-bottom: 7px;
        font-weight: 700;
      }

      .skill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .skill-chip {
        position: relative;
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border: 1px solid #cbd8d5;
        border-radius: 999px;
        padding: 3px 9px;
        background: #fff;
        color: #263331;
        font-size: 13px;
        line-height: 1.3;
      }

      .skill-chip.has-tip {
        border-color: #9fc9c2;
        background: var(--accent-soft);
        cursor: help;
      }

      .skill-chip.missing-skill {
        border-color: #f59e0b;
        background: #fff7ed;
        color: var(--warn);
      }

      .skill-chip.substitute {
        border-color: #f3bd8d;
        background: #fff7ed;
        color: var(--warn);
      }

      .skill-chip.has-tip::after {
        position: absolute;
        left: 0;
        bottom: calc(100% + 8px);
        z-index: 20;
        display: none;
        width: max-content;
        max-width: 320px;
        border: 1px solid #9fc9c2;
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--text);
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(17, 24, 39, 0.16);
        content: attr(data-tooltip);
        white-space: pre-line;
        font-size: 13px;
        font-weight: 500;
        line-height: 1.55;
      }

      .skill-chip.has-tip:hover::after {
        display: block;
      }

      .missing {
        margin-top: 10px;
        border: 1px solid #fed7aa;
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--warn);
        background: var(--warn-soft);
        font-size: 13px;
        line-height: 1.6;
      }

      .empty {
        padding: 18px 14px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 860px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .picker-column {
          position: static;
        }

        .check-grid {
          max-height: 300px;
        }

        .match-top {
          flex-direction: column;
        }

        .score {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>三谋 S2 配队匹配</h1>
          <div class="small">选择已有武将和战法，按 S2 攻略队伍计算匹配度。</div>
        </div>
        <div class="status" id="status">正在读取队伍数据...</div>
      </header>

      <div class="toolbar">
        <button class="primary" id="matchBtn" type="button">匹配队伍</button>
        <button id="selectAllBtn" type="button">武将战法全选</button>
        <button id="clearAllBtn" type="button">全部清空</button>
      </div>

      <div class="workspace">
        <div class="picker-column">
          <div class="layout">
            <section>
              <div class="section-head">
                <h2>武将</h2>
                <div class="actions">
                  <button data-action="select" data-target="generals" type="button">全选</button>
                  <button data-action="clear" data-target="generals" type="button">清空</button>
                </div>
              </div>
              <input class="search" id="generalSearch" placeholder="搜索武将" autocomplete="off">
              <div class="check-grid" id="generalList"></div>
            </section>

            <section>
              <div class="section-head">
                <h2>战法</h2>
                <div class="actions">
                  <button data-action="select" data-target="skills" type="button">全选</button>
                  <button data-action="clear" data-target="skills" type="button">清空</button>
                </div>
              </div>
              <input class="search" id="skillSearch" placeholder="搜索战法" autocomplete="off">
              <div class="check-grid" id="skillList"></div>
            </section>
          </div>
        </div>

        <section class="results">
          <div class="results-head">
            <h2>匹配结果</h2>
            <div class="small" id="selectedCount">未选择</div>
          </div>
          <div class="result-list" id="results">
            <div class="empty">勾选武将和战法后点击匹配。</div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const DATA_URL = "s2_data.json";
      const state = {
        teams: [],
        plans: [],
        generals: [],
        skills: [],
        replacement: new Map(),
      };

      const skillEffects = {
        横征暴敛: "减伤/控制链，适合补队伍生存。",
        以静制动: "减伤，偏稳定防守。",
        坚如磐石: "减伤，前排承伤替代。",
        如沐春风: "减伤兼恢复，提升续航。",
        来好息师: "双前排减伤/恢复替代。",
        巧利天灾: "控制链核心，配合狂风大作。",
        狂风大作: "控制链，补控制和干扰。",
        料事: "单控向替代。",
        水淹: "单控向替代，也可按定位换出伤。",
        战八方: "增伤向替代。",
        强袭: "输出/增伤替代。",
        束手无策: "控制替代。",
        出其不意: "出伤/爆发替代。",
        横扫千军: "追击/兵刃输出替代。",
        千里突袭: "追击输出替代。",
        夜袭: "追击输出替代。",
        疾行侧击: "机动输出替代。",
        铸甲销戈: "减伤/防御替代。",
        避其: "减伤替代。",
        兵书临峰: "通过兵书补减伤。",
        轻装驰援: "减伤/支援替代。",
        势如: "主动增伤替代。",
        铁骑: "追击增伤替代。",
        方圆阵: "阵型减伤替代。",
        青囊: "治疗/续航替代。",
        任人唯贤: "辅助增益替代。",
        指点: "辅助增益/控制链替代。",
        烈火焚营: "谋略输出替代。",
        火羽: "谋略输出下位替代。",
        洞若观火: "阵型/洞察辅助替代。",
        百战不殆: "增伤/出伤替代。",
        上兵伐谋: "谋略输出替代。",
        势如破竹: "兵刃输出替代。",
        锐不可当: "增伤/追击输出替代。",
        如有神助: "辅助增益替代。",
      };

      const $ = (id) => document.getElementById(id);

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function normalizeName(name) {
        return String(name || "").trim();
      }

      function splitSkillName(name) {
        return normalizeName(name)
          .split("/")
          .map((part) => part.trim())
          .filter(Boolean);
      }

      function uniqueSorted(values) {
        return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function strengthValue(name) {
        const match = String(name || "").match(/T\s*(\d+(?:\.\d+)?)([+-])?/i);
        if (!match) return 99;
        const base = Number(match[1]);
        const suffix = match[2] === "+" ? -0.01 : match[2] === "-" ? 0.01 : 0;
        return base + suffix;
      }

      function normalizeTeam(team, index, source, plan, priority) {
        const normalized = {
          ...team,
          source,
          plan,
          priority,
          id: `${source}-${index}`,
          generals: (team.generals || []).map(normalizeName).filter(Boolean),
          requiredSkills: Object.values(team.skills || {}).flat().map(normalizeName).filter(Boolean),
        };
        normalized.strength = strengthValue(normalized.team_name);
        return normalized;
      }

      function flattenTeams(data) {
        const coexist = (data.s2_coexist_plans || []).flatMap((plan) =>
          (plan.teams || []).map((team) => ({
            ...team,
            source: "S2五队共存",
            plan: plan.plan_name,
            priority: 0,
          }))
        );
        const strong = (data.s2_strong_teams || []).flatMap((group) =>
          (group.teams || []).map((team) => ({
            ...team,
            source: "S2强队合集",
            plan: group.tier,
            priority: 1,
          }))
        );
        return [...coexist, ...strong].map((team, index) =>
          normalizeTeam(team, index, team.source, team.plan, team.priority)
        );
      }

      function buildCoexistPlans(data) {
        return (data.s2_coexist_plans || []).map((plan, planIndex) => ({
          name: plan.plan_name,
          condition: plan.condition,
          teams: (plan.teams || []).map((team, teamIndex) =>
            normalizeTeam(team, `${planIndex}-${teamIndex}`, "S2五队共存", plan.plan_name, 0)
          ),
        }));
      }

      function buildReplacementMap(guide) {
        const map = new Map();
        for (const item of guide?.chains || []) {
          const from = normalizeName(item.name);
          const candidates = [];
          if (item.replace) candidates.push(...item.replace);
          if (item.sequence) candidates.push(...item.sequence.slice(1));
          if (item.branches) candidates.push(...item.branches);
          const cleaned = candidates
            .flatMap((text) => String(text).split(/[+；;,，]/))
            .map((text) => text.replace(/（.*?）|\(.*?\)|主C：|辅助：|主动：|追击：|刘备：|乐进：|袁绍：/g, "").trim())
            .filter(Boolean);
          if (from && cleaned.length) map.set(from, uniqueSorted(cleaned));
        }
        return map;
      }

      function renderOptions(containerId, names, groupName) {
        const container = $(containerId);
        container.innerHTML = names.map((name) => `
          <label class="option" data-name="${name}">
            <input type="checkbox" name="${groupName}" value="${name}">
            <span>${name}</span>
          </label>
        `).join("");
        container.addEventListener("change", updateSelectedCount);
      }

      function filterOptions(inputId, listId) {
        const term = $(inputId).value.trim().toLowerCase();
        for (const label of $(listId).querySelectorAll(".option")) {
          label.hidden = term && !label.dataset.name.toLowerCase().includes(term);
        }
      }

      function setGroupChecked(groupName, checked) {
        document.querySelectorAll(`input[name="${groupName}"]`).forEach((input) => {
          input.checked = checked;
        });
        updateSelectedCount();
      }

      function getSelected(groupName) {
        return new Set([...document.querySelectorAll(`input[name="${groupName}"]:checked`)].map((input) => input.value));
      }

      function updateSelectedCount() {
        const generals = getSelected("generals").size;
        const skills = getSelected("skills").size;
        $("selectedCount").textContent = `已选武将 ${generals} 个，战法 ${skills} 个`;
      }

      function skillMatched(required, selectedSkills) {
        return splitSkillName(required).some((name) => selectedSkills.has(name));
      }

      function findReplacement(required, selectedSkills) {
        const options = splitSkillName(required);
        for (const option of options) {
          const candidates = state.replacement.get(option) || [];
          const owned = candidates.filter((candidate) => selectedSkills.has(candidate));
          if (owned.length) return { best: option, owned };
        }
        return null;
      }

      function replacementTooltip(skill) {
        const candidates = splitSkillName(skill).flatMap((name) => state.replacement.get(name) || []);
        const unique = uniqueSorted(candidates);
        if (!unique.length) return "";
        const lines = unique.map((name) => `${name}: ${skillEffects[name] || "攻略替代链推荐，按队伍缺口补位。"}`);
        return `下位替代\n${lines.join("\n")}`;
      }

      function skillChip(skill, extraClass = "", tooltipOverride = "", showDefaultTooltip = true) {
        const tooltip = tooltipOverride || (showDefaultTooltip ? replacementTooltip(skill) : "");
        const classes = ["skill-chip", extraClass, tooltip ? "has-tip" : ""].filter(Boolean).join(" ");
        const tipAttr = tooltip ? ` data-tooltip="${escapeHtml(tooltip)}"` : "";
        return `<span class="${classes}"${tipAttr}>${escapeHtml(skill)}</span>`;
      }

      function teamSkillChip(skill, selectedSkills) {
        const matched = skillMatched(skill, selectedSkills);
        return matched ? skillChip(skill, "", "", false) : skillChip(skill, "missing-skill");
      }

      function missingSkillChips(skills) {
        if (!skills.length) return "";
        return `<div>缺战法: <span class="skill-list">${skills.map((skill) => skillChip(skill)).join("")}</span></div>`;
      }

      function substitutionRows(items) {
        if (!items.length) return "";
        return items.map((item) => {
          const chips = item.replacement.owned.map((skill) =>
            skillChip(skill, "substitute", `${skill}\n${skillEffects[skill] || "攻略替代链推荐，按队伍缺口补位。"}`)
          ).join("");
          return `<div>可替 ${escapeHtml(item.required)}: <span class="skill-list">${chips}</span></div>`;
        }).join("");
      }

      function scoreTeam(team, selectedGenerals, selectedSkills) {
        const matchedGenerals = team.generals.filter((name) => selectedGenerals.has(name));
        const missingGenerals = team.generals.filter((name) => !selectedGenerals.has(name));
        const matchedSkills = team.requiredSkills.filter((name) => skillMatched(name, selectedSkills));
        const missingSkills = team.requiredSkills.filter((name) => !skillMatched(name, selectedSkills));
        const substitutions = missingSkills
          .map((name) => ({ required: name, replacement: findReplacement(name, selectedSkills) }))
          .filter((item) => item.replacement);

        return {
          team,
          matchedGenerals,
          missingGenerals,
          matchedSkills,
          missingSkills,
          substitutions,
          heroScore: team.generals.length ? matchedGenerals.length / team.generals.length : 0,
          skillScore: team.requiredSkills.length ? matchedSkills.length / team.requiredSkills.length : 0,
        };
      }

      function matchTeams() {
        const selectedGenerals = getSelected("generals");
        const selectedSkills = getSelected("skills");

        const matches = state.teams
          .map((team) => scoreTeam(team, selectedGenerals, selectedSkills))
          .filter((match) => match.missingGenerals.length === 0)
          .sort((a, b) =>
            b.skillScore - a.skillScore ||
            a.team.strength - b.team.strength ||
            a.team.priority - b.team.priority ||
            a.team.team_name.localeCompare(b.team.team_name, "zh-CN")
          );

        renderResults(pickUniqueOwnedHeroTeams(matches, selectedSkills));
      }

      function preferredSkill(required, selectedSkills, usedSkills) {
        const options = splitSkillName(required);
        const owned = options.find((name) => selectedSkills.has(name) && !usedSkills.has(name));
        if (owned) return owned;
        const unused = options.find((name) => !usedSkills.has(name));
        return unused || options[0] || required;
      }

      function teamUsage(match, selectedSkills, usedSkills) {
        return {
          generals: new Set(match.team.generals),
          skills: new Set(match.team.requiredSkills.map((skill) => preferredSkill(skill, selectedSkills, usedSkills))),
        };
      }

      function hasConflict(usage, usedGenerals, usedSkills) {
        return [...usage.generals].some((name) => usedGenerals.has(name)) ||
          [...usage.skills].some((name) => usedSkills.has(name));
      }

      function pickUniqueTeams(matches, selectedSkills) {
        const picked = [];
        const usedGenerals = new Set();
        const usedSkills = new Set();

        for (const match of matches) {
          if (picked.length >= 5) break;
          const usage = teamUsage(match, selectedSkills, usedSkills);
          if (hasConflict(usage, usedGenerals, usedSkills)) continue;
          picked.push({ ...match, usage });
          usage.generals.forEach((name) => usedGenerals.add(name));
          usage.skills.forEach((name) => usedSkills.add(name));
        }

        return picked;
      }

      function pickUniqueOwnedHeroTeams(matches, selectedSkills) {
        const picked = [];
        const usedGenerals = new Set();
        const usedSkills = new Set();

        for (const match of matches) {
          if (picked.length >= 5) break;
          const generalConflict = match.team.generals.some((name) => usedGenerals.has(name));
          if (generalConflict) continue;

          const matchedSkillNames = match.matchedSkills.map((skill) => preferredSkill(skill, selectedSkills, usedSkills));
          const skillConflict = matchedSkillNames.some((name) => usedSkills.has(name));
          if (skillConflict) continue;

          picked.push({
            ...match,
            usage: {
              generals: new Set(match.team.generals),
              skills: new Set(matchedSkillNames),
            },
          });
          match.team.generals.forEach((name) => usedGenerals.add(name));
          matchedSkillNames.forEach((name) => usedSkills.add(name));
        }

        return picked;
      }

      function scorePlan(plan, selectedGenerals, selectedSkills) {
        const matches = plan.teams.map((team) => scoreTeam(team, selectedGenerals, selectedSkills));
        const planUsedSkills = new Set();
        const usage = matches.map((match) => {
          const item = teamUsage(match, selectedSkills, planUsedSkills);
          item.skills.forEach((name) => planUsedSkills.add(name));
          return item;
        });
        const allGenerals = usage.flatMap((item) => [...item.generals]);
        const allSkills = usage.flatMap((item) => [...item.skills]);
        const uniqueGenerals = new Set(allGenerals);
        const uniqueSkills = new Set(allSkills);
        const hasConflict = uniqueGenerals.size !== allGenerals.length || uniqueSkills.size !== allSkills.length;
        const heroScore = matches.reduce((sum, item) => sum + item.heroScore, 0) / Math.max(matches.length, 1);
        const skillScore = matches.reduce((sum, item) => sum + item.skillScore, 0) / Math.max(matches.length, 1);
        const strength = matches.reduce((sum, item) => sum + item.team.strength, 0) / Math.max(matches.length, 1);

        return {
          plan,
          matches: matches
            .map((match, index) => ({ ...match, usage: usage[index] }))
            .sort((a, b) => a.team.strength - b.team.strength || a.team.team_name.localeCompare(b.team.team_name, "zh-CN")),
          hasConflict,
          heroScore,
          skillScore,
          strength,
        };
      }

      function pickBestFive(matches, selectedGenerals, selectedSkills) {
        const planCandidates = state.plans
          .map((plan) => scorePlan(plan, selectedGenerals, selectedSkills))
          .filter((candidate) => !candidate.hasConflict)
          .sort((a, b) =>
            b.heroScore - a.heroScore ||
            b.skillScore - a.skillScore ||
            a.strength - b.strength ||
            a.plan.name.localeCompare(b.plan.name, "zh-CN")
          );

        if (planCandidates.length) {
          return planCandidates[0].matches.slice(0, 5);
        }

        return pickUniqueTeams(matches, selectedSkills)
          .sort((a, b) => a.team.strength - b.team.strength || a.team.team_name.localeCompare(b.team.team_name, "zh-CN"));
      }

      function renderResults(matches) {
        if (!matches.length) {
          $("results").innerHTML = '<div class="empty">没有三名武将都齐的队伍。缺武将的队伍不会显示。</div>';
          return;
        }

        $("results").innerHTML = matches.map((match) => {
          const team = match.team;
          const score = `武将 ${match.matchedGenerals.length}/${team.generals.length} · 战法 ${match.matchedSkills.length}/${team.requiredSkills.length}`;
          const selectedSkills = getSelected("skills");
          const rows = team.generals.map((general) => {
            const skills = team.skills?.[general] || [];
            return `
              <div class="general-row">
                <div class="general-name">${escapeHtml(general)}</div>
                <div class="skill-list">${skills.map((skill) => teamSkillChip(skill, selectedSkills)).join("")}</div>
              </div>
            `;
          }).join("");
          const missingSkills = missingSkillChips(match.missingSkills);
          const substitutions = substitutionRows(match.substitutions);
          const missingGenerals = match.missingGenerals.length
            ? `<div>缺武将: ${match.missingGenerals.join("、")}</div>`
            : "";
          const missingBlock = missingGenerals || missingSkills || substitutions
            ? `<div class="missing">${missingGenerals}${missingSkills}${substitutions}</div>`
            : "";

          return `
            <article class="match">
              <div class="match-top">
                <div>
                  <h3>${team.team_name}</h3>
                </div>
                <div class="score">${score}</div>
              </div>
              <div class="rows">${rows}</div>
              ${missingBlock}
            </article>
          `;
        }).join("");
      }

      async function boot() {
        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          state.teams = flattenTeams(data);
          state.plans = buildCoexistPlans(data);
          state.replacement = buildReplacementMap(data.replacement_guide);
          state.generals = uniqueSorted(state.teams.flatMap((team) => team.generals));
          state.skills = uniqueSorted(state.teams.flatMap((team) => team.requiredSkills.flatMap(splitSkillName)));

          renderOptions("generalList", state.generals, "generals");
          renderOptions("skillList", state.skills, "skills");
          $("status").textContent = `已载入 ${state.plans.length} 套五队方案、${state.teams.length} 个队伍，优先按 S2 五队共存匹配`;
          updateSelectedCount();
        } catch (error) {
          $("status").textContent = "队伍数据读取失败";
          $("results").innerHTML = `<div class="empty">无法读取 ${DATA_URL}。请通过本地服务器或 GitHub Pages 打开页面。</div>`;
          console.error(error);
        }
      }

      $("matchBtn").addEventListener("click", matchTeams);
      $("selectAllBtn").addEventListener("click", () => {
        setGroupChecked("generals", true);
        setGroupChecked("skills", true);
      });
      $("clearAllBtn").addEventListener("click", () => {
        setGroupChecked("generals", false);
        setGroupChecked("skills", false);
      });
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          setGroupChecked(button.dataset.target, button.dataset.action === "select");
        });
      });
      $("generalSearch").addEventListener("input", () => filterOptions("generalSearch", "generalList"));
      $("skillSearch").addEventListener("input", () => filterOptions("skillSearch", "skillList"));

      boot();
    </script>
  </body>
</html>
