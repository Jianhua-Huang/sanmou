<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>三谋 S2 配队匹配</title>
    <meta name="description" content="基于 S2 队伍攻略的武将与战法匹配工具。">
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f1;
        --text: #15201f;
        --muted: #60706d;
        --accent: #087568;
        --accent-strong: #075e54;
        --accent-soft: #e4f5f2;
        --line: #d7dfdc;
        --panel: #ffffff;
        --panel-soft: #f8faf9;
        --soft: #eaf7f4;
        --warn: #9a3412;
        --warn-soft: #fff4ed;
        --shadow: 0 12px 34px rgba(17, 24, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, #f9fbfb 0, var(--bg) 360px),
          var(--bg);
      }

      main {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 24px 18px 48px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px 20px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .status {
        max-width: 380px;
        border: 1px solid #b9dcd6;
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--muted);
        background: var(--accent-soft);
        font-size: 14px;
        text-align: right;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 13px;
        color: var(--text);
        background: var(--panel);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease, transform 0.15s ease;
      }

      button:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .primary {
        border-color: var(--accent);
        color: #fff;
        background: var(--accent);
        font-weight: 700;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        align-items: start;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(340px, 420px) minmax(0, 1fr);
        gap: 14px;
        align-items: start;
      }

      .picker-column {
        display: grid;
        gap: 14px;
        align-self: start;
        position: sticky;
        top: 14px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 8px 22px rgba(17, 24, 39, 0.05);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
        border-radius: 8px 8px 0 0;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .actions button {
        min-height: 32px;
        padding: 5px 10px;
        font-size: 14px;
        background: #fff;
      }

      .search {
        width: calc(100% - 28px);
        margin: 12px 14px 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 11px;
        font: inherit;
        outline: none;
        background: #fff;
      }

      .search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(8, 117, 104, 0.12);
      }

      .check-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        gap: 8px;
        max-height: 290px;
        overflow: auto;
        padding: 14px;
      }

      .group-list {
        display: grid;
        gap: 10px;
        max-height: 290px;
        overflow: auto;
        padding: 14px;
      }

      .group,
      .subgroup {
        border: 1px solid #e3ebe8;
        border-radius: 6px;
        background: #fff;
      }

      .group > summary,
      .subgroup > summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 34px;
        padding: 7px 9px;
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
        list-style: none;
      }

      .group > summary::-webkit-details-marker,
      .subgroup > summary::-webkit-details-marker {
        display: none;
      }

      .group-count {
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .group .check-grid,
      .subgroup .check-grid {
        max-height: none;
        overflow: visible;
        padding: 0 9px 10px;
      }

      .subgroup-wrap {
        display: grid;
        gap: 8px;
        padding: 0 9px 10px;
      }

      label.option {
        display: flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 9px;
        background: #fff;
        font-size: 14px;
        line-height: 1.3;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }

      label.option:hover {
        border-color: #9fc9c2;
        box-shadow: 0 2px 8px rgba(17, 24, 39, 0.06);
      }

      label.option:has(input:checked) {
        border-color: var(--accent);
        background: var(--soft);
        color: var(--accent-strong);
        font-weight: 650;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--accent);
      }

      .results {
        min-height: 620px;
      }

      .results-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
        border-radius: 8px 8px 0 0;
      }

      .result-list {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .match {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fff;
        box-shadow: 0 4px 14px rgba(17, 24, 39, 0.04);
      }

      .match-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .match h3 {
        margin: 0;
        font-size: 17px;
      }

      .copy-team {
        border-color: #cbd8d5;
        padding: 5px 9px;
        background: #fff;
        font-size: 12px;
      }

      .score {
        min-width: 150px;
        align-self: start;
        border: 1px solid #b9dcd6;
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--accent-strong);
        background: var(--accent-soft);
        font-weight: 700;
        text-align: right;
        font-size: 13px;
      }

      .meta,
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .rows {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .general-row {
        border: 1px solid #e5ebe8;
        border-radius: 6px;
        padding: 8px 9px;
        background: #fbfcfc;
        line-height: 1.5;
      }

      .variant-list {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .variant {
        border: 1px solid #e5ebe8;
        border-radius: 6px;
        padding: 10px;
        background: #fbfcfc;
      }

      .variant.alt {
        border-color: #f3d2ae;
        background: #fffaf3;
      }

      .variant-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .variant-title {
        font-weight: 700;
      }

      .variant-tag {
        border: 1px solid #cbd8d5;
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--muted);
        background: #fff;
        font-size: 12px;
        white-space: nowrap;
      }

      .variant.alt .variant-tag {
        border-color: #f3bd8d;
        color: var(--warn);
        background: #fff7ed;
      }

      .general-name {
        margin-bottom: 7px;
        font-weight: 700;
      }

      .skill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .skill-chip {
        position: relative;
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border: 1px solid #cbd8d5;
        border-radius: 999px;
        padding: 3px 9px;
        background: #fff;
        color: #263331;
        font-size: 13px;
        line-height: 1.3;
      }

      .skill-chip.has-tip {
        border-color: #9fc9c2;
        background: var(--accent-soft);
        cursor: help;
      }

      .skill-chip.missing-skill {
        border-color: #f59e0b;
        background: #fff7ed;
        color: var(--warn);
      }

      .skill-chip.substitute {
        border-color: #f3bd8d;
        background: #fff7ed;
        color: var(--warn);
      }

      .skill-chip.major-drop {
        border-color: #fb7185;
        background: #fff1f2;
        color: #be123c;
      }

      .skill-chip.blocked-skill {
        border-color: #f87171;
        background: #fef2f2;
        color: #b91c1c;
      }

      .skill-chip.has-tip::after {
        position: absolute;
        left: 0;
        bottom: calc(100% + 8px);
        z-index: 20;
        display: none;
        width: max-content;
        max-width: 320px;
        border: 1px solid #9fc9c2;
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--text);
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(17, 24, 39, 0.16);
        content: attr(data-tooltip);
        white-space: pre-line;
        font-size: 13px;
        font-weight: 500;
        line-height: 1.55;
      }

      .skill-chip.has-tip:hover::after {
        display: block;
      }

      .skill-chip.has-tip.tip-open::after {
        display: block;
      }

      .other-matches {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .other-matches > summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 42px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        list-style: none;
      }

      .other-matches > summary::-webkit-details-marker {
        display: none;
      }

      .other-list {
        display: grid;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding: 12px;
      }

      .missing {
        margin-top: 10px;
        border: 1px solid #fed7aa;
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--warn);
        background: var(--warn-soft);
        font-size: 13px;
        line-height: 1.6;
      }

      .empty {
        padding: 18px 14px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 860px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .picker-column {
          position: static;
        }

        .check-grid {
          max-height: 300px;
        }

        .match-top {
          flex-direction: column;
        }

        .score {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>三谋 S2 配队匹配</h1>
          <div class="small">选择已有武将和战法，按 S2 攻略队伍计算匹配度。</div>
        </div>
        <div>
          <div class="status" id="status">正在读取队伍数据...</div>
          <div class="small"><a href="admin.html">模板管理</a></div>
        </div>
      </header>

      <div class="toolbar">
        <button class="primary" id="matchBtn" type="button">匹配队伍</button>
        <button id="selectAllBtn" type="button">武将战法全选</button>
        <button id="clearAllBtn" type="button">全部清空</button>
      </div>

      <div class="workspace">
        <div class="picker-column">
          <div class="layout">
            <section>
              <div class="section-head">
                <h2>武将</h2>
                <div class="actions">
                  <button data-action="select" data-target="generals" type="button">全选</button>
                  <button data-action="clear" data-target="generals" type="button">清空</button>
                </div>
              </div>
              <input class="search" id="generalSearch" placeholder="搜索武将" autocomplete="off">
              <div class="check-grid" id="generalList"></div>
            </section>

            <section>
              <div class="section-head">
                <h2>战法</h2>
                <div class="actions">
                  <button data-action="select" data-target="skills" type="button">全选</button>
                  <button data-action="clear" data-target="skills" type="button">清空</button>
                </div>
              </div>
              <input class="search" id="skillSearch" placeholder="搜索战法" autocomplete="off">
              <div class="check-grid" id="skillList"></div>
            </section>
          </div>
        </div>

        <section class="results">
          <div class="results-head">
            <h2>推荐配队</h2>
            <div class="small" id="selectedCount">未选择</div>
          </div>
          <div class="result-list" id="results">
            <div class="empty">勾选武将和战法后点击匹配。</div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const DATA_URL = "s2_data.json";
      const CONFIG_STORAGE_KEY = "sanmouTemplateConfigV1";
      const state = {
        teams: [],
        plans: [],
        libraryGroups: [],
        generals: [],
        skills: [],
        generalMeta: {},
        skillMeta: {},
        replacement: new Map(),
      };

      const skillEffects = {
        横征暴敛: "减伤/控制链，适合补队伍生存。",
        以静制动: "减伤，偏稳定防守。",
        坚如磐石: "减伤，前排承伤替代。",
        如沐春风: "减伤兼恢复，提升续航。",
        来好息师: "双前排减伤/恢复替代。",
        巧利天灾: "控制链核心，配合狂风大作。",
        狂风大作: "控制链，补控制和干扰。",
        料事: "单控向替代。",
        水淹: "单控向替代，也可按定位换出伤。",
        战八方: "增伤向替代。",
        强袭: "输出/增伤替代。",
        束手无策: "控制替代。",
        出其不意: "出伤/爆发替代。",
        横扫千军: "追击/兵刃输出替代。",
        千里突袭: "追击输出替代。",
        夜袭: "追击输出替代。",
        疾行侧击: "机动输出替代。",
        铸甲销戈: "减伤/防御替代。",
        避其: "减伤替代。",
        兵书临峰: "通过兵书补减伤。",
        轻装驰援: "减伤/支援替代。",
        势如: "主动增伤替代。",
        铁骑: "追击增伤替代。",
        方圆阵: "阵型减伤替代。",
        青囊: "治疗/续航替代。",
        任人唯贤: "辅助增益替代。",
        指点: "辅助增益/控制链替代。",
        烈火焚营: "谋略输出替代。",
        火羽: "谋略输出下位替代。",
        洞若观火: "阵型/洞察辅助替代。",
        百战不殆: "增伤/出伤替代。",
        上兵伐谋: "谋略输出替代。",
        势如破竹: "兵刃输出替代。",
        锐不可当: "增伤/追击输出替代。",
        如有神助: "辅助增益替代。",
      };

      const coreSkills = new Set([
        "指点乾坤",
      ]);

      const importantSkills = new Set([
        "胜敌益强",
        "王佐之才",
        "如有神助",
        "披坚执锐",
        "摧坚克难",
        "锐不可当",
        "兵贵神速",
        "辕门射戟",
        "韬光养晦",
        "巧利天灾",
        "狂风大作",
      ]);

      const $ = (id) => document.getElementById(id);

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function normalizeName(name) {
        return String(name || "").trim();
      }

      function splitSkillName(name) {
        return normalizeName(name)
          .split("/")
          .map((part) => part.trim())
          .filter(Boolean);
      }

      function uniqueSorted(values) {
        return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function strengthValue(name) {
        const match = String(name || "").match(/T\s*(\d+(?:\.\d+)?)([+-])?/i);
        if (!match) return 99;
        const base = Number(match[1]);
        const suffix = match[2] === "+" ? -0.01 : match[2] === "-" ? 0.01 : 0;
        return base + suffix;
      }

      function normalizeTeam(team, index, source, plan, priority) {
        const normalized = {
          ...team,
          source,
          plan,
          priority,
          id: `${source}-${index}`,
          generals: (team.generals || []).map(normalizeName).filter(Boolean),
          requiredSkills: Object.values(team.skills || {}).flat().map(normalizeName).filter(Boolean),
          skillRules: team.skill_rules || {},
        };
        normalized.strength = strengthValue(normalized.team_name);
        return normalized;
      }

      function loadTemplateConfig() {
        try {
          const raw = localStorage.getItem(CONFIG_STORAGE_KEY);
          if (!raw) return null;
          const config = JSON.parse(raw);
          return Array.isArray(config?.teams) ? config : null;
        } catch (error) {
          console.warn("模板配置读取失败", error);
          return null;
        }
      }

      function normalizeManagedTeam(team) {
        const generals = (team.generals || []).map(normalizeName).filter(Boolean).slice(0, 3);
        const skills = {};
        generals.forEach((general) => {
          skills[general] = (team.skills?.[general] || []).map(normalizeName).filter(Boolean).slice(0, 2);
        });
        return {
          team_name: normalizeName(team.team_name) || "未命名队伍",
          tier: normalizeName(team.tier) || "自定义",
          note: "模板管理页配置",
          generals,
          skills,
          skill_rules: team.skill_rules || {},
        };
      }

      function applyTemplateConfig(data) {
        const config = loadTemplateConfig();
        if (!config?.teams?.length) return data;
        const managedTeams = config.teams.map(normalizeManagedTeam).filter((team) => team.generals.length === 3);
        if (!managedTeams.length) return data;
        const managedNames = new Set(managedTeams.map((team) => team.team_name));
        const cloned = {
          ...data,
          s2_strong_teams: (data.s2_strong_teams || []).map((group) => ({
            ...group,
            teams: (group.teams || []).filter((team) => !managedNames.has(team.team_name)),
          })),
        };
        cloned.s2_strong_teams.push({
          tier: "模板配置",
          start_row: "admin",
          teams: managedTeams,
        });
        return cloned;
      }

      function teamKey(generals) {
        return [...generals].sort((a, b) => a.localeCompare(b, "zh-CN")).join("||");
      }

      function skillSignature(team) {
        return team.generals.map((general) => `${general}:${(team.skills?.[general] || []).join(",")}`).join("|");
      }

      function buildLibraryGroups(data) {
        const groups = new Map();
        const strongTeams = (data.s2_strong_teams || []).flatMap((group) =>
          (group.teams || []).map((team, index) => normalizeTeam(team, `strong-${group.start_row}-${index}`, "S2强队合集", group.tier, 0))
        );
        const coexistTeams = (data.s2_coexist_plans || []).flatMap((plan, planIndex) =>
          (plan.teams || []).map((team, teamIndex) => normalizeTeam(team, `coexist-${planIndex}-${teamIndex}`, "S2五队共存", plan.plan_name, 1))
        );

        strongTeams.forEach((team) => {
          const key = teamKey(team.generals);
          if (!groups.has(key)) {
            groups.set(key, {
              key,
              generals: team.generals,
              names: new Set(),
              strength: team.strength,
              variants: [],
              signatures: new Set(),
            });
          }
          const group = groups.get(key);
          group.names.add(team.team_name);
          group.strength = Math.min(group.strength, team.strength);
          group.variants.push({ team, type: "strong" });
          group.signatures.add(skillSignature(team));
        });

        coexistTeams.forEach((team) => {
          const key = teamKey(team.generals);
          const group = groups.get(key);
          if (!group) return;
          const signature = skillSignature(team);
          if (group.signatures.has(signature)) return;
          group.variants.push({ team, type: "coexist" });
          group.signatures.add(signature);
        });

        return [...groups.values()].map((group) => ({
          ...group,
          names: [...group.names],
          variants: group.variants.sort((a, b) =>
            (a.type === b.type ? 0 : a.type === "strong" ? -1 : 1) ||
            a.team.strength - b.team.strength ||
            a.team.team_name.localeCompare(b.team.team_name, "zh-CN")
          ),
        }));
      }

      function flattenTeams(data) {
        const coexist = (data.s2_coexist_plans || []).flatMap((plan) =>
          (plan.teams || []).map((team) => ({
            ...team,
            source: "S2五队共存",
            plan: plan.plan_name,
            priority: 0,
          }))
        );
        const strong = (data.s2_strong_teams || []).flatMap((group) =>
          (group.teams || []).map((team) => ({
            ...team,
            source: "S2强队合集",
            plan: group.tier,
            priority: 1,
          }))
        );
        return [...coexist, ...strong].map((team, index) =>
          normalizeTeam(team, index, team.source, team.plan, team.priority)
        );
      }

      function buildCoexistPlans(data) {
        return (data.s2_coexist_plans || []).map((plan, planIndex) => ({
          name: plan.plan_name,
          condition: plan.condition,
          teams: (plan.teams || []).map((team, teamIndex) =>
            normalizeTeam(team, `${planIndex}-${teamIndex}`, "S2五队共存", plan.plan_name, 0)
          ),
        }));
      }

      function buildReplacementMap(guide) {
        const map = new Map();
        for (const item of guide?.chains || []) {
          const from = normalizeName(item.name);
          const candidates = [];
          if (item.replace) candidates.push(...item.replace);
          if (item.sequence) candidates.push(...item.sequence.slice(1));
          if (item.branches) candidates.push(...item.branches);
          const cleaned = candidates
            .flatMap((text) => String(text).split(/[+；;,，]/))
            .map((text) => text.replace(/（.*?）|\(.*?\)|主C：|辅助：|主动：|追击：|刘备：|乐进：|袁绍：/g, "").trim())
            .filter(Boolean);
          if (from && cleaned.length) map.set(from, uniqueSorted(cleaned));
        }
        return map;
      }

      function renderOptions(containerId, names, groupName) {
        const container = $(containerId);
        container.innerHTML = names.map((name) => `
          <label class="option" data-name="${name}">
            <input type="checkbox" name="${groupName}" value="${name}">
            <span>${name}</span>
          </label>
        `).join("");
        container.addEventListener("change", updateSelectedCount);
      }

      function optionMarkup(name, groupName) {
        return `
          <label class="option" data-name="${escapeHtml(name)}">
            <input type="checkbox" name="${groupName}" value="${escapeHtml(name)}">
            <span>${escapeHtml(name)}</span>
          </label>
        `;
      }

      function renderGeneralOptions() {
        const container = $("generalList");
        container.className = "group-list";
        const order = ["魏", "蜀", "吴", "群", "未分类"];
        const groups = new Map(order.map((name) => [name, []]));
        state.generals.forEach((name) => {
          const camp = state.generalMeta[name]?.camp || "未分类";
          if (!groups.has(camp)) groups.set(camp, []);
          groups.get(camp).push(name);
        });
        container.innerHTML = [...groups.entries()]
          .filter(([, names]) => names.length)
          .map(([camp, names]) => `
            <details class="group" open>
              <summary><span>${camp}</span><span class="group-count">${names.length}</span></summary>
              <div class="check-grid">${names.map((name) => optionMarkup(name, "generals")).join("")}</div>
            </details>
          `).join("");
        container.addEventListener("change", updateSelectedCount);
      }

      function renderSkillOptions() {
        const container = $("skillList");
        container.className = "group-list";
        const activationOrder = ["主动", "被动", "指挥", "追击", "未分类"];
        const effectOrder = ["兵刃", "谋略", "辅助", "治疗", "防御", "文武", "未分类"];
        const groups = new Map();
        state.skills.forEach((name) => {
          const meta = state.skillMeta[name] || {};
          const activation = meta.activation_type || "未分类";
          const effect = meta.effect_type || "未分类";
          if (!groups.has(activation)) groups.set(activation, new Map());
          if (!groups.get(activation).has(effect)) groups.get(activation).set(effect, []);
          groups.get(activation).get(effect).push(name);
        });
        const activations = [...groups.keys()].sort((a, b) =>
          (activationOrder.indexOf(a) === -1 ? 99 : activationOrder.indexOf(a)) -
          (activationOrder.indexOf(b) === -1 ? 99 : activationOrder.indexOf(b)) ||
          a.localeCompare(b, "zh-CN")
        );
        container.innerHTML = activations.map((activation) => {
          const effectMap = groups.get(activation);
          const total = [...effectMap.values()].reduce((sum, names) => sum + names.length, 0);
          const effects = [...effectMap.keys()].sort((a, b) =>
            (effectOrder.indexOf(a) === -1 ? 99 : effectOrder.indexOf(a)) -
            (effectOrder.indexOf(b) === -1 ? 99 : effectOrder.indexOf(b)) ||
            a.localeCompare(b, "zh-CN")
          );
          return `
            <details class="group" open>
              <summary><span>${activation}</span><span class="group-count">${total}</span></summary>
              <div class="subgroup-wrap">
                ${effects.map((effect) => {
                  const names = effectMap.get(effect);
                  return `
                    <details class="subgroup" open>
                      <summary><span>${effect}</span><span class="group-count">${names.length}</span></summary>
                      <div class="check-grid">${names.map((name) => optionMarkup(name, "skills")).join("")}</div>
                    </details>
                  `;
                }).join("")}
              </div>
            </details>
          `;
        }).join("");
        container.addEventListener("change", updateSelectedCount);
      }

      function filterOptions(inputId, listId) {
        const term = $(inputId).value.trim().toLowerCase();
        for (const label of $(listId).querySelectorAll(".option")) {
          label.hidden = term && !label.dataset.name.toLowerCase().includes(term);
        }
      }

      function setGroupChecked(groupName, checked) {
        document.querySelectorAll(`input[name="${groupName}"]`).forEach((input) => {
          input.checked = checked;
        });
        updateSelectedCount();
      }

      function getSelected(groupName) {
        return new Set([...document.querySelectorAll(`input[name="${groupName}"]:checked`)].map((input) => input.value));
      }

      function updateSelectedCount() {
        const generals = getSelected("generals").size;
        const skills = getSelected("skills").size;
        $("selectedCount").textContent = `已选武将 ${generals} 个，战法 ${skills} 个`;
      }

      function skillMatched(required, selectedSkills) {
        return splitSkillName(required).some((name) => selectedSkills.has(name));
      }

      function findReplacement(required, selectedSkills) {
        const options = splitSkillName(required);
        for (const option of options) {
          const candidates = state.replacement.get(option) || [];
          const owned = candidates.filter((candidate) => selectedSkills.has(candidate));
          if (owned.length) return { best: option, owned };
        }
        return null;
      }

      function replacementCandidates(required) {
        return uniqueSorted(splitSkillName(required).flatMap((name) => state.replacement.get(name) || []));
      }

      function compatibleReplacementCandidates(required, selectedSkills, usedSkills, extraCandidates = []) {
        const candidates = uniqueSorted([...extraCandidates, ...replacementCandidates(required)]);
        return candidates.filter((name) => selectedSkills.has(name) && !usedSkills.has(name));
      }

      function replacementTooltip(skill) {
        const unique = replacementCandidates(skill);
        if (!unique.length) return "";
        const lines = unique.map((name) => `${name}: ${skillEffects[name] || "攻略替代链推荐，按队伍缺口补位。"}`);
        return `下位替代\n${lines.join("\n")}`;
      }

      function skillChip(skill, extraClass = "", tooltipOverride = "", showDefaultTooltip = true) {
        const tooltip = tooltipOverride || (showDefaultTooltip ? replacementTooltip(skill) : "");
        const classes = ["skill-chip", extraClass, tooltip ? "has-tip" : ""].filter(Boolean).join(" ");
        const tipAttr = tooltip ? ` data-tooltip="${escapeHtml(tooltip)}" tabindex="0" role="button"` : "";
        return `<span class="${classes}"${tipAttr}>${escapeHtml(skill)}</span>`;
      }

      function assignmentTooltip(assignment) {
        const candidates = replacementCandidates(assignment.required);
        const lines = [];
        if (assignment.status === "substitute") {
          lines.push(`原战法: ${assignment.required}`);
        }
        if (assignment.isCore) {
          lines.push("核心战法，不可替换。缺失或被占用时该队强度不成立。");
        }
        if (assignment.isImportant && assignment.status === "substitute") {
          lines.push("重点战法已替换，队伍强度会大幅下降。");
        }
        if (assignment.reason) {
          lines.push(assignment.reason);
        }
        if (!assignment.isCore && candidates.length) {
          lines.push("可用平替:");
          candidates.forEach((name) => {
            lines.push(`${name}: ${skillEffects[name] || "攻略替代链推荐，按队伍缺口补位。"}`);
          });
        }
        return lines.join("\n");
      }

      function assignmentChip(assignment) {
        if (assignment.status === "owned") {
          return skillChip(assignment.skill, "", "", false);
        }
        if (assignment.status === "substitute") {
          return skillChip(assignment.skill, assignment.isImportant ? "substitute major-drop" : "substitute", assignmentTooltip(assignment), false);
        }
        return skillChip(assignment.required, "blocked-skill", assignmentTooltip(assignment), false);
      }

      function teamSkillChip(skill, selectedSkills) {
        const matched = skillMatched(skill, selectedSkills);
        return matched ? skillChip(skill, "", "", false) : skillChip(skill, "missing-skill");
      }

      function missingSkillChips(skills) {
        if (!skills.length) return "";
        return `<div>缺战法: <span class="skill-list">${skills.map((skill) => skillChip(skill)).join("")}</span></div>`;
      }

      function substitutionRows(items) {
        if (!items.length) return "";
        return items.map((item) => {
          const chips = item.replacement.owned.map((skill) =>
            skillChip(skill, "substitute", `${skill}\n${skillEffects[skill] || "攻略替代链推荐，按队伍缺口补位。"}`)
          ).join("");
          return `<div>可替 ${escapeHtml(item.required)}: <span class="skill-list">${chips}</span></div>`;
        }).join("");
      }

      function renderVariant(variant, selectedSkills) {
        const team = variant.team;
        const label = variant.type === "strong" ? "强队合集" : "五队共存补充";
        const rows = team.generals.map((general) => {
          const skills = team.skills?.[general] || [];
          return `
            <div class="general-row">
              <div class="general-name">${escapeHtml(general)}</div>
              <div class="skill-list">${skills.map((skill) => teamSkillChip(skill, selectedSkills)).join("")}</div>
            </div>
          `;
        }).join("");
        const missing = variant.missingSkills.length
          ? `<div class="missing">${missingSkillChips(variant.missingSkills)}</div>`
          : "";
        return `
          <div class="variant ${variant.type === "coexist" ? "alt" : ""}">
            <div class="variant-head">
              <div class="variant-title">${escapeHtml(team.team_name)}</div>
              <div class="variant-tag">${label} · 战法 ${variant.matchedSkills.length}/${team.requiredSkills.length}</div>
            </div>
            <div class="rows">${rows}</div>
            ${missing}
          </div>
        `;
      }

      function scoreTeam(team, selectedGenerals, selectedSkills) {
        const matchedGenerals = team.generals.filter((name) => selectedGenerals.has(name));
        const missingGenerals = team.generals.filter((name) => !selectedGenerals.has(name));
        const matchedSkills = team.requiredSkills.filter((name) => skillMatched(name, selectedSkills));
        const missingSkills = team.requiredSkills.filter((name) => !skillMatched(name, selectedSkills));
        const substitutions = missingSkills
          .map((name) => ({ required: name, replacement: findReplacement(name, selectedSkills) }))
          .filter((item) => item.replacement);

        return {
          team,
          matchedGenerals,
          missingGenerals,
          matchedSkills,
          missingSkills,
          substitutions,
          heroScore: team.generals.length ? matchedGenerals.length / team.generals.length : 0,
          skillScore: team.requiredSkills.length ? matchedSkills.length / team.requiredSkills.length : 0,
        };
      }

      function scoreVariant(variant, selectedSkills) {
        const team = variant.team;
        const matchedSkills = team.requiredSkills.filter((name) => skillMatched(name, selectedSkills));
        const missingSkills = team.requiredSkills.filter((name) => !skillMatched(name, selectedSkills));
        return {
          ...variant,
          matchedSkills,
          missingSkills,
          skillScore: team.requiredSkills.length ? matchedSkills.length / team.requiredSkills.length : 0,
        };
      }

      function scoreLibraryGroup(group, selectedSkills) {
        const variants = group.variants
          .map((variant) => scoreVariant(variant, selectedSkills))
          .sort((a, b) =>
            b.skillScore - a.skillScore ||
            (a.type === b.type ? 0 : a.type === "strong" ? -1 : 1) ||
            a.team.strength - b.team.strength ||
            a.team.team_name.localeCompare(b.team.team_name, "zh-CN")
          );
        const best = variants[0];
        return {
          group,
          variants,
          best,
          skillScore: best?.skillScore || 0,
          strength: group.strength,
        };
      }

      function hasSkillTag(required, tagSet) {
        return splitSkillName(required).some((name) => tagSet.has(name));
      }

      function skillRuleFor(team, general, required) {
        return team.skillRules?.[general]?.[required] || {};
      }

      function assignRequiredSkill(required, selectedSkills, usedSkills, team, general) {
        const rule = skillRuleFor(team, general, required);
        const ruleReplacements = (rule.replacements || []).map(normalizeName).filter(Boolean);
        const isCore = Boolean(rule.core) || hasSkillTag(required, coreSkills);
        const isImportant = Boolean(rule.important) || hasSkillTag(required, importantSkills);
        const direct = splitSkillName(required).find((name) => selectedSkills.has(name) && !usedSkills.has(name));
        if (direct) {
          return {
            required,
            skill: direct,
            status: "owned",
            reserves: direct,
            isCore,
            isImportant,
          };
        }

        const directOwned = splitSkillName(required).find((name) => selectedSkills.has(name) && usedSkills.has(name));
        if (isCore) {
          return {
            required,
            skill: required,
            status: "missing",
            reserves: "",
            isCore,
            isImportant,
            reason: directOwned ? `${directOwned} 已被更高 T 队伍占用` : "未选择核心战法",
          };
        }

        const substitute = compatibleReplacementCandidates(required, selectedSkills, usedSkills, ruleReplacements)[0];
        if (substitute) {
          return {
            required,
            skill: substitute,
            status: "substitute",
            reserves: substitute,
            isCore,
            isImportant,
            reason: directOwned
              ? `${directOwned} 已被更高 T 队伍占用，使用攻略平替`
              : "未选择原战法，使用攻略平替",
          };
        }

        return {
          required,
          skill: required,
          status: "missing",
          reserves: "",
          isCore,
          isImportant,
          reason: directOwned ? `${directOwned} 已被更高 T 队伍占用，且没有可用平替` : "未选择原战法，且没有可用平替",
        };
      }

      function assignVariant(variant, selectedSkills, usedSkills) {
        const assignmentsByGeneral = {};
        const localUsed = new Set(usedSkills);
        let ownedCount = 0;
        let substituteCount = 0;
        let majorDropCount = 0;
        let coreMissingCount = 0;

        variant.team.generals.forEach((general) => {
          assignmentsByGeneral[general] = (variant.team.skills?.[general] || []).map((required) => {
            const assignment = assignRequiredSkill(required, selectedSkills, localUsed, variant.team, general);
            if (assignment.reserves) {
              localUsed.add(assignment.reserves);
            }
            if (assignment.status === "owned") ownedCount += 1;
            if (assignment.status === "substitute") substituteCount += 1;
            if (assignment.status === "substitute" && assignment.isImportant) majorDropCount += 1;
            if (assignment.status === "missing" && assignment.isCore) coreMissingCount += 1;
            return assignment;
          });
        });

        return {
          ...variant,
          assignmentsByGeneral,
          ownedCount,
          substituteCount,
          majorDropCount,
          coreMissingCount,
          assignedCount: ownedCount + substituteCount,
          missingCount: variant.team.requiredSkills.length - ownedCount - substituteCount,
          reservedSkills: [...localUsed].filter((name) => !usedSkills.has(name)),
        };
      }

      function bestFinalVariant(group, selectedSkills, usedSkills) {
        return group.variants
          .filter((variant) => variant.type === "strong")
          .map((variant) => assignVariant(variant, selectedSkills, usedSkills))
          .sort((a, b) =>
            b.assignedCount - a.assignedCount ||
            b.ownedCount - a.ownedCount ||
            a.substituteCount - b.substituteCount ||
            a.team.strength - b.team.strength ||
            a.team.team_name.localeCompare(b.team.team_name, "zh-CN")
          )[0];
      }

      function variantMatchScore(variant) {
        if (!variant) return -Infinity;
        const total = Math.max(variant.team.requiredSkills.length, 1);
        const skillRatio = variant.assignedCount / total;
        return skillRatio * 100
          - variant.coreMissingCount * 18
          - variant.missingCount * 8
          - variant.majorDropCount * 3
          - variant.team.strength * 4;
      }

      function sortCandidates(a, b) {
        return b.rankScore - a.rankScore ||
          b.finalVariant.assignedCount - a.finalVariant.assignedCount ||
          a.finalVariant.coreMissingCount - b.finalVariant.coreMissingCount ||
          a.finalVariant.missingCount - b.finalVariant.missingCount ||
          a.finalVariant.team.strength - b.finalVariant.team.strength ||
          a.finalVariant.team.team_name.localeCompare(b.finalVariant.team.team_name, "zh-CN");
      }

      function teamCopyText(match) {
        const variant = match.finalVariant;
        const lines = [variant.team.team_name];
        variant.team.generals.forEach((general) => {
          const skills = (variant.assignmentsByGeneral[general] || []).map((assignment) => assignment.skill || assignment.required);
          lines.push(`${general}: ${skills.join("、")}`);
        });
        return lines.join("\n");
      }

      function matchTeams() {
        const selectedGenerals = getSelected("generals");
        const selectedSkills = getSelected("skills");

        const matches = state.libraryGroups
          .filter((group) => group.generals.every((name) => selectedGenerals.has(name)))
          .map((group) => scoreLibraryGroup(group, selectedSkills))
          .sort((a, b) =>
            b.skillScore - a.skillScore ||
            a.strength - b.strength ||
            a.group.names[0].localeCompare(b.group.names[0], "zh-CN")
          );

        renderResults(pickFinalTeams(matches, selectedSkills));
      }

      function preferredSkill(required, selectedSkills, usedSkills) {
        const options = splitSkillName(required);
        const owned = options.find((name) => selectedSkills.has(name) && !usedSkills.has(name));
        if (owned) return owned;
        const unused = options.find((name) => !usedSkills.has(name));
        return unused || options[0] || required;
      }

      function teamUsage(match, selectedSkills, usedSkills) {
        return {
          generals: new Set(match.team.generals),
          skills: new Set(match.team.requiredSkills.map((skill) => preferredSkill(skill, selectedSkills, usedSkills))),
        };
      }

      function hasConflict(usage, usedGenerals, usedSkills) {
        return [...usage.generals].some((name) => usedGenerals.has(name)) ||
          [...usage.skills].some((name) => usedSkills.has(name));
      }

      function pickUniqueTeams(matches, selectedSkills) {
        const picked = [];
        const usedGenerals = new Set();
        const usedSkills = new Set();

        for (const match of matches) {
          if (picked.length >= 5) break;
          const usage = teamUsage(match, selectedSkills, usedSkills);
          if (hasConflict(usage, usedGenerals, usedSkills)) continue;
          picked.push({ ...match, usage });
          usage.generals.forEach((name) => usedGenerals.add(name));
          usage.skills.forEach((name) => usedSkills.add(name));
        }

        return picked;
      }

      function pickUniqueOwnedHeroTeams(matches, selectedSkills) {
        const picked = [];
        const usedGenerals = new Set();
        const usedSkills = new Set();

        for (const match of matches) {
          if (picked.length >= 5) break;
          const generalConflict = match.team.generals.some((name) => usedGenerals.has(name));
          if (generalConflict) continue;

          const matchedSkillNames = match.matchedSkills.map((skill) => preferredSkill(skill, selectedSkills, usedSkills));
          const skillConflict = matchedSkillNames.some((name) => usedSkills.has(name));
          if (skillConflict) continue;

          picked.push({
            ...match,
            usage: {
              generals: new Set(match.team.generals),
              skills: new Set(matchedSkillNames),
            },
          });
          match.team.generals.forEach((name) => usedGenerals.add(name));
          matchedSkillNames.forEach((name) => usedSkills.add(name));
        }

        return picked;
      }

      function pickUniqueLibraryGroups(matches, selectedSkills) {
        const picked = [];
        const usedGenerals = new Set();
        const usedSkills = new Set();

        for (const match of matches) {
          if (picked.length >= 5) break;
          if (match.group.generals.some((name) => usedGenerals.has(name))) continue;
          const matchedSkillNames = match.best.matchedSkills.map((skill) => preferredSkill(skill, selectedSkills, usedSkills));
          if (matchedSkillNames.some((name) => usedSkills.has(name))) continue;
          picked.push(match);
          match.group.generals.forEach((name) => usedGenerals.add(name));
          matchedSkillNames.forEach((name) => usedSkills.add(name));
        }

        return picked;
      }

      function pickFinalTeams(matches, selectedSkills) {
        const perfectPicked = [];
        const perfectKeys = new Set();
        const perfectUsedGenerals = new Set();
        const perfectUsedSkills = new Set();
        const ranked = matches
          .map((match) => {
            const finalVariant = bestFinalVariant(match.group, selectedSkills, new Set());
            return finalVariant
              ? { ...match, finalVariant, rankScore: variantMatchScore(finalVariant) }
              : null;
          })
          .filter(Boolean)
          .sort(sortCandidates);

        for (const match of ranked) {
          if (match.group.generals.some((name) => perfectUsedGenerals.has(name))) continue;
          const finalVariant = bestFinalVariant(match.group, selectedSkills, perfectUsedSkills);
          if (!finalVariant || finalVariant.missingCount || finalVariant.coreMissingCount) continue;
          perfectPicked.push({
            ...match,
            finalVariant,
            rankScore: variantMatchScore(finalVariant),
            usedSkillsBefore: new Set(perfectUsedSkills),
          });
          perfectKeys.add(match.group.key);
          match.group.generals.forEach((name) => perfectUsedGenerals.add(name));
          finalVariant.reservedSkills.forEach((name) => perfectUsedSkills.add(name));
        }

        const imperfect = ranked
          .filter((match) => !perfectKeys.has(match.group.key))
          .map((match) => {
            const finalVariant = bestFinalVariant(match.group, selectedSkills, perfectUsedSkills);
            return finalVariant
              ? {
                ...match,
                finalVariant,
                rankScore: variantMatchScore(finalVariant),
                folded: true,
              }
              : null;
          })
          .filter(Boolean)
          .sort(sortCandidates);
        const extraPerfect = imperfect.filter((match) => !match.finalVariant.missingCount && !match.finalVariant.coreMissingCount);
        const remainingImperfect = imperfect.filter((match) => match.finalVariant.missingCount || match.finalVariant.coreMissingCount);
        const visiblePerfect = [...perfectPicked, ...extraPerfect];
        const visibleImperfect = visiblePerfect.length >= 2 ? [] : remainingImperfect.slice(0, 2 - visiblePerfect.length);
        const visibleKeys = new Set([...visiblePerfect, ...visibleImperfect].map((match) => match.group.key));
        const folded = remainingImperfect
          .filter((match) => !visibleKeys.has(match.group.key))
          .map((match) => ({ ...match, folded: true }));

        return { picked: [...visiblePerfect, ...visibleImperfect], folded };
      }

      function scorePlan(plan, selectedGenerals, selectedSkills) {
        const matches = plan.teams.map((team) => scoreTeam(team, selectedGenerals, selectedSkills));
        const planUsedSkills = new Set();
        const usage = matches.map((match) => {
          const item = teamUsage(match, selectedSkills, planUsedSkills);
          item.skills.forEach((name) => planUsedSkills.add(name));
          return item;
        });
        const allGenerals = usage.flatMap((item) => [...item.generals]);
        const allSkills = usage.flatMap((item) => [...item.skills]);
        const uniqueGenerals = new Set(allGenerals);
        const uniqueSkills = new Set(allSkills);
        const hasConflict = uniqueGenerals.size !== allGenerals.length || uniqueSkills.size !== allSkills.length;
        const heroScore = matches.reduce((sum, item) => sum + item.heroScore, 0) / Math.max(matches.length, 1);
        const skillScore = matches.reduce((sum, item) => sum + item.skillScore, 0) / Math.max(matches.length, 1);
        const strength = matches.reduce((sum, item) => sum + item.team.strength, 0) / Math.max(matches.length, 1);

        return {
          plan,
          matches: matches
            .map((match, index) => ({ ...match, usage: usage[index] }))
            .sort((a, b) => a.team.strength - b.team.strength || a.team.team_name.localeCompare(b.team.team_name, "zh-CN")),
          hasConflict,
          heroScore,
          skillScore,
          strength,
        };
      }

      function pickBestFive(matches, selectedGenerals, selectedSkills) {
        const planCandidates = state.plans
          .map((plan) => scorePlan(plan, selectedGenerals, selectedSkills))
          .filter((candidate) => !candidate.hasConflict)
          .sort((a, b) =>
            b.heroScore - a.heroScore ||
            b.skillScore - a.skillScore ||
            a.strength - b.strength ||
            a.plan.name.localeCompare(b.plan.name, "zh-CN")
          );

        if (planCandidates.length) {
          return planCandidates[0].matches.slice(0, 5);
        }

        return pickUniqueTeams(matches, selectedSkills)
          .sort((a, b) => a.team.strength - b.team.strength || a.team.team_name.localeCompare(b.team.team_name, "zh-CN"));
      }

      function renderMatch(match) {
        const group = match.group;
        const variant = match.finalVariant;
        const team = variant.team;
        const score = `战法 ${variant.assignedCount}/${team.requiredSkills.length}`;
        const rows = team.generals.map((general) => {
          const assignments = variant.assignmentsByGeneral[general] || [];
          return `
            <div class="general-row">
              <div class="general-name">${escapeHtml(general)}</div>
              <div class="skill-list">${assignments.map(assignmentChip).join("")}</div>
            </div>
          `;
        }).join("");
        const summary = [
          variant.substituteCount ? `平替 ${variant.substituteCount} 个` : "",
          variant.majorDropCount ? `强度大降 ${variant.majorDropCount} 个` : "",
          variant.coreMissingCount ? `缺核心 ${variant.coreMissingCount} 个` : "",
          variant.missingCount ? `缺失 ${variant.missingCount} 个` : "",
        ].filter(Boolean).join(" · ");

        return `
          <article class="match">
            <div class="match-top">
              <div>
                <h3>${escapeHtml(team.team_name)}</h3>
                <div class="small">${group.generals.map(escapeHtml).join("、")}${summary ? ` · ${summary}` : ""}</div>
              </div>
              <div>
                <div class="score">${score}</div>
                <button class="copy-team" type="button" data-copy="${escapeHtml(teamCopyText(match))}">复制配置</button>
              </div>
            </div>
            <div class="rows">${rows}</div>
          </article>
        `;
      }

      function renderResults(result) {
        const matches = result.picked || [];
        const folded = result.folded || [];
        if (!matches.length && !folded.length) {
          $("results").innerHTML = '<div class="empty">没有三名武将都齐的队伍。缺武将的队伍不会显示。</div>';
          return;
        }

        const visibleHtml = matches.map(renderMatch).join("");
        const foldedHtml = folded.length
          ? `
            <details class="other-matches">
              <summary>
                <span>备选队伍（缺战法/冲突）</span>
                <span class="group-count">${folded.length}</span>
              </summary>
              <div class="other-list">${folded.map(renderMatch).join("")}</div>
            </details>
          `
          : "";

        $("results").innerHTML = visibleHtml + foldedHtml;
      }

      async function boot() {
        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = applyTemplateConfig(await response.json());
          state.teams = flattenTeams(data);
          state.plans = buildCoexistPlans(data);
          state.libraryGroups = buildLibraryGroups(data);
          state.replacement = buildReplacementMap(data.replacement_guide);
          state.generalMeta = data.metadata?.generals || {};
          state.skillMeta = data.metadata?.skills || {};
          state.generals = uniqueSorted(state.teams.flatMap((team) => team.generals));
          state.skills = uniqueSorted(state.teams.flatMap((team) => team.requiredSkills.flatMap(splitSkillName)));

          renderGeneralOptions();
          renderSkillOptions();
          $("status").textContent = `已载入强队组合 ${state.libraryGroups.length} 组（含 S1 补充），五队共存仅用于补充战法组合`;
          updateSelectedCount();
        } catch (error) {
          $("status").textContent = "队伍数据读取失败";
          $("results").innerHTML = `<div class="empty">无法读取 ${DATA_URL}。请通过本地服务器或 GitHub Pages 打开页面。</div>`;
          console.error(error);
        }
      }

      $("matchBtn").addEventListener("click", matchTeams);
      $("selectAllBtn").addEventListener("click", () => {
        setGroupChecked("generals", true);
        setGroupChecked("skills", true);
      });
      $("clearAllBtn").addEventListener("click", () => {
        setGroupChecked("generals", false);
        setGroupChecked("skills", false);
      });
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          setGroupChecked(button.dataset.target, button.dataset.action === "select");
        });
      });
      document.addEventListener("click", (event) => {
        const copyButton = event.target.closest(".copy-team");
        if (copyButton) {
          navigator.clipboard?.writeText(copyButton.dataset.copy || "");
          copyButton.textContent = "已复制";
          setTimeout(() => {
            copyButton.textContent = "复制配置";
          }, 1200);
          return;
        }
        const chip = event.target.closest(".skill-chip.has-tip");
        document.querySelectorAll(".skill-chip.tip-open").forEach((item) => {
          if (item !== chip) item.classList.remove("tip-open");
        });
        if (chip) {
          chip.classList.toggle("tip-open");
        }
      });
      $("generalSearch").addEventListener("input", () => filterOptions("generalSearch", "generalList"));
      $("skillSearch").addEventListener("input", () => filterOptions("skillSearch", "skillList"));

      boot();
    </script>
  </body>
</html>
